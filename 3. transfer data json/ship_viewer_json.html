<html>
        <head>
        <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
        <script src="jquery-2.1.4.js"></script>
        <link rel="stylesheet" type="text/css" href="styles.css">
        </head>
        <body>
       <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
       <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
       <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
       <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
       <script>
            let backendPython = null;

            document.addEventListener("DOMContentLoaded", function () {
            if (typeof qt !== 'undefined') {
                new QWebChannel(qt.webChannelTransport, function (channel) {
                    backendPython = channel.objects.backend;
                    console.log("WebChannel terhubung ke Python!");

                });
            }
        });
            
            function readAllData() {
            if (!backendPython) {
                console.log("Menunggu WebChannel siap...");
                return;
            }  

            //console.log("its alive");
            // 1. Baca position.csv → posisi & heading & z kapal
            if (typeof backendPython.getPositionData === "function") {
                backendPython.getPositionData(function (responseString) {
                    //console.log("RAW:", responseString);
                    try {
                        const pos = JSON.parse(responseString);
                        console.log(" x:", pos.x, "y:", pos.y, "z:", pos.z, "theta:", pos.theta);
                        cube2.position.x = pos.x;
                        cube2.position.y = pos.z;
                        cube2.position.z = pos.y;
                        if (pos.error || pos.status) return;

                        

                        
                    } catch (err) {
                        console.error("Gagal parse position.csv:", err);
                    }
                });
            }

            
            }

            setInterval(readAllData, 100);

        </script>
       
       
       <script>
            var scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);

            // Camera
            var camera = new THREE.PerspectiveCamera(
                100,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );

            camera.position.set(15, 15, 15);

            // Renderer
            var renderer = new THREE.WebGLRenderer({
                antialias: true
            });

            renderer.setSize(
                window.innerWidth,
                window.innerHeight
            );

            document.body.appendChild(renderer.domElement);

            // Orbit Controls
            var controls = new THREE.OrbitControls(
                camera,
                renderer.domElement
            );

            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            controls.target.set(0, 0, 0);
            controls.update();

            // Cube
            var geometry = new THREE.BoxGeometry(3, 3, 3);
            var material = new THREE.MeshBasicMaterial({
                color: 0xff0000
            });

            var cube = new THREE.Mesh(
                geometry,
                material
            );

            scene.add(cube);

            cube.position.x = 5;
            cube.position.y = 0;
            cube.position.z = 0;


            var geometry_cube2 = new THREE.BoxGeometry(2,2,2);
            var material_cube2 = new THREE.MeshBasicMaterial({
                color: 0x9C2113
                
            });

            var cube2 = new THREE.Mesh(
                geometry_cube2,
                material_cube2
            );
            scene.add(cube2);


            // Axes
            var axesHelper = new THREE.AxesHelper(10);
            scene.add(axesHelper);

            // Grid
            var gridHelper = new THREE.GridHelper(200, 200);
            scene.add(gridHelper);

            // Animation
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(
                    scene,
                    camera
                );
            }

            animate();

            // Resize
            window.addEventListener('resize', function () {

                camera.aspect =
                    window.innerWidth /
                    window.innerHeight;

                camera.updateProjectionMatrix();

                renderer.setSize(
                    window.innerWidth,
                    window.innerHeight
                );

            });
                    
        </script>

        

        <style>
            html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;

            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
        }


        </style>
        </body>
</html>
